services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coldmailer
      POSTGRES_PASSWORD: coldmailer
      POSTGRES_DB: coldmailer
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldmailer"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: coldmailer
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "while true; do
        pg_dump -h db -U coldmailer coldmailer > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql
        && echo \"Backup done: $$(date)\"
        && find /backups -name '*.sql' -mtime +7 -delete;
        sleep 86400;
      done"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://coldmailer:coldmailer@db:5432/coldmailer
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
