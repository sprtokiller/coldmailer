services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coldmailer
      POSTGRES_PASSWORD: coldmailer
      POSTGRES_DB: coldmailer
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldmailer"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: coldmailer
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "/backup.sh"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  app:
    image: oven/bun:1-debian
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://coldmailer:coldmailer@db:5432/coldmailer
    command: /bin/sh -c "bun install && bun run dev"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  node_modules:
