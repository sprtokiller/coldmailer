services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coldmailer
      POSTGRES_PASSWORD: coldmailer
      POSTGRES_DB: coldmailer
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldmailer"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: coldmailer
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "/backup.sh"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://coldmailer:coldmailer@db:5432/coldmailer
      NUXT_GOOGLE_CLIENT_ID: ${NUXT_GOOGLE_CLIENT_ID}
      NUXT_GOOGLE_CLIENT_SECRET: ${NUXT_GOOGLE_CLIENT_SECRET}
      NUXT_GOOGLE_REDIRECT_URI: ${NUXT_GOOGLE_REDIRECT_URI:-http://localhost:3000/api/auth/callback/google}
      NUXT_OPEN_ROUTER_API_KEY: ${NUXT_OPEN_ROUTER_API_KEY}
      NUXT_OPEN_ROUTER_MANAGEMENT_KEY: ${NUXT_OPEN_ROUTER_MANAGEMENT_KEY}
      NUXT_SERP_API_KEYS: ${NUXT_SERP_API_KEYS}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
