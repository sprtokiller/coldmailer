services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coldmailer
      POSTGRES_PASSWORD: coldmailer
      POSTGRES_DB: coldmailer
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldmailer"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://coldmailer:coldmailer@db:5432/coldmailer
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
