vars:
  - name: "GIT_REPO"
    value: "https://github.com/sprtokiller/coldmailer.git"
  - name: "GIT_BRANCH"
    value: "master"
  - name: "APP_DIR"
    value: "~/coldmailer"
  - name: "COMPOSE_PROJECT"
    value: "cold_mail"

steps:
  - name: "Update repository"
    run: "if [ -d {{!APP_DIR!}}/.git ]; then cd {{!APP_DIR!}} && git fetch origin && git reset --hard origin/{{!GIT_BRANCH!}}; else git clone --branch {{!GIT_BRANCH!}} --depth 1 {{!GIT_REPO!}} {{!APP_DIR!}}; fi"

  - name: "Build application image"
    run: "cd {{!APP_DIR!}} && docker compose -p {{!COMPOSE_PROJECT!}} build --pull app"

  - name: "Deploy containers"
    run: "cd {{!APP_DIR!}} && docker compose -p {{!COMPOSE_PROJECT!}} up -d"

  - name: "Wait for application"
    run: "cd {{!APP_DIR!}}; for i in $(seq 1 60); do curl -sf http://localhost:3000/ >/dev/null && exit 0; sleep 5; done; echo 'Application did not become healthy within 5 minutes' >&2; echo '--- docker compose logs app (last 300 lines) ---' >&2; docker compose -p {{!COMPOSE_PROJECT!}} logs app --tail 300 --no-color; exit 1"

  - name: "Prune dangling images"
    run: "docker image prune -f"
