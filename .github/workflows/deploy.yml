name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server (live stream)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          set -euo pipefail

          LOG_FILE="${RUNNER_TEMP}/deploy.log"

          curl --no-buffer --fail --show-error --silent \
            --retry 3 --retry-delay 2 --retry-all-errors \
            --connect-timeout 10 --max-time 900 \
            -X POST \
            -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @deploy-flow.yml \
            "${DEPLOY_URL}/deploy" \
          | tee "${LOG_FILE}"

          if grep -Eq '\[EXIT CODE: [1-9][0-9]*\]' "${LOG_FILE}"; then
            echo "Deployer reported non-zero exit code."
            exit 1
          fi

          if grep -Fq "[WORKER ERROR:" "${LOG_FILE}"; then
            echo "Worker error detected."
            exit 1
          fi